<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Shield gradient: deep graphite -->
    <linearGradient id="shieldGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#222230"/>
      <stop offset="100%" stop-color="#0C0C10"/>
    </linearGradient>
    <!-- Flame gradient: orange → deep orange -->
    <linearGradient id="flameGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Outer glow -->
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#F97316" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <path
    d="M256 28 L448 108 C448 108 460 280 256 484 C52 280 64 108 64 108 Z"
    fill="url(#shieldGrad)"
    stroke="url(#flameGrad)"
    stroke-width="4"
    filter="url(#outerGlow)"
  />

  <!-- Inner border highlight -->
  <path
    d="M256 52 L428 124 C428 124 438 274 256 458 C74 274 84 124 84 124 Z"
    fill="none"
    stroke="rgba(249,115,22,0.15)"
    stroke-width="1.5"
  />

  <!-- Flame icon center -->
  <g transform="translate(256, 240)" filter="url(#glow)">
    <!-- Main flame -->
    <path
      d="M0 -100 C30 -60 60 -30 60 20 C60 55 33 80 0 80 C-33 80 -60 55 -60 20 C-60 -30 -30 -60 0 -100Z"
      fill="url(#flameGrad)"
    />
    <!-- Inner flame (lighter) -->
    <path
      d="M0 -40 C15 -20 30 0 30 30 C30 48 17 60 0 60 C-17 60 -30 48 -30 30 C-30 0 -15 -20 0 -40Z"
      fill="#FDBA74"
      opacity="0.7"
    />
    <!-- Core flame (brightest) -->
    <path
      d="M0 0 C8 10 15 20 15 35 C15 44 8 50 0 50 C-8 50 -15 44 -15 35 C-15 20 -8 10 0 0Z"
      fill="#FFF7ED"
      opacity="0.5"
    />
  </g>
</svg>
